name: linter
on:
  pull_request:
    branches: [ "main", "release*" ]

jobs:
  golangci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Build custom golangci-lint
        run: |
          make custom-golangci-lint
          install ./bin/custom-gcl /usr/local/bin/golangci-lint
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          install-mode: none
          version: v2.12.2
          args: --verbose --timeout=15m
          only-new-issues: true
  crdify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Install tools
        run: |
          go install sigs.k8s.io/crdify@v0.5.0
          go install sigs.k8s.io/kustomize/kustomize/v5@v5.6.0
      - name: Build kustomized CRDs
        run: |
          REPO="${{ github.event.pull_request.head.repo.full_name }}"
          mkdir -p /tmp/crd-base /tmp/crd-head
          kustomize build "https://github.com/${REPO}//config/crd?ref=${{ github.event.pull_request.base.sha }}" -o /tmp/crd-base/
          kustomize build "https://github.com/${REPO}//config/crd?ref=${{ github.event.pull_request.head.sha }}" -o /tmp/crd-head/
      - name: Compare CRDs
        run: |
          FAILED=0
          for crd in /tmp/crd-head/*_customresourcedefinition_*.yaml; do
            NAME=$(basename "$crd")
            echo "--- Comparing ${NAME} ---"
            if [ ! -f "/tmp/crd-base/${NAME}" ]; then
              echo "Skipping: not present in base (new CRD)"
              continue
            fi
            if ! crdify --config=crdify.yaml "file:///tmp/crd-base/${NAME}" "file://${crd}"; then
              FAILED=1
            fi
          done
          exit $FAILED


