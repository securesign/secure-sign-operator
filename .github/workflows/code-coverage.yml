name: Code Coverage

on:
  push:
    branches: [ "main", "release*" ]
  pull_request:
    branches: [ "main", "release*" ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Generate code and setup envtest
        run: make manifests generate envtest

      - name: Run tests with coverage
        run: |
          LOCALBIN="$(pwd)/bin"
          ENVTEST=$(find "$LOCALBIN" -maxdepth 1 -name 'setup-envtest-*' -type f | head -1)
          ENVTEST_K8S_VERSION=$(grep '^ENVTEST_K8S_VERSION' Makefile | awk -F '?= ' '{print $2}' | tr -d ' ')
          KUBEBUILDER_ASSETS="$($ENVTEST use "$ENVTEST_K8S_VERSION" --bin-dir "$LOCALBIN" -p path)" \
            go test -v -coverprofile=coverage.out $(go list ./... | grep -v /e2e)

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
