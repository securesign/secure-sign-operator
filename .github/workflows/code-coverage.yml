name: Code Coverage

on:
  push:
    branches: [ "main", "release*" ]
  pull_request:
    branches: [ "main", "release*" ]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Generate code and setup envtest
        run: make manifests generate envtest

      - name: Run tests with coverage
        run: |
          ENVTEST="./bin/setup-envtest-release-0.20"
          KUBEBUILDER_ASSETS="$($ENVTEST use 1.32.0 --bin-dir ./bin -p path)" \
            go test -v -coverprofile=coverage.out $(go list ./... | grep -v /e2e)

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
