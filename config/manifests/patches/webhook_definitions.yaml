# Webhook definitions for OLM-managed deployments.
# OLM uses these to create webhook configs, services, and inject TLS certs.
- op: add
  path: /spec/webhookdefinitions
  value:
  - type: ConversionWebhook
    conversionCRDs:
    - securesigns.rhtas.redhat.com
    - fulcios.rhtas.redhat.com
    - trillians.rhtas.redhat.com
    - rekors.rhtas.redhat.com
    - tufs.rhtas.redhat.com
    - ctlogs.rhtas.redhat.com
    - timestampauthorities.rhtas.redhat.com
    generateName: crhtas-redhat-com
    sideEffects: None
    admissionReviewVersions:
    - v1
    containerPort: 9443
    targetPort: 9443
    deploymentName: operator-controller-manager
    webhookPath: /convert
  - type: MutatingAdmissionWebhook
    generateName: msecuresign.kb.io
    rules:
    - apiGroups:
      - rhtas.redhat.com
      apiVersions:
      - v1alpha1
      operations:
      - CREATE
      - UPDATE
      resources:
      - securesigns
    sideEffects: None
    admissionReviewVersions:
    - v1
    containerPort: 9443
    targetPort: 9443
    deploymentName: operator-controller-manager
    webhookPath: /mutate-rhtas-redhat-com-v1alpha1-securesign
  - type: MutatingAdmissionWebhook
    generateName: mfulcio.kb.io
    rules:
    - apiGroups:
      - rhtas.redhat.com
