# SecureSign CR with PKCS#11 HSM-backed Fulcio CA
#
# This sample uses SoftHSM2 as a reference implementation. For production,
# replace init containers, volumes, and environment variables with your
# vendor-specific HSM configuration.
#
# Prerequisites:
#   1. Create the HSM PIN secret:
#        kubectl create secret generic hsm-credentials \
#          --from-literal=pin=<your-hsm-pin>
#
#   2. Create the PKCS#11 configuration secret (crypto11.conf):
#        cat <<EOF > /tmp/crypto11.conf
#        {
#          "Path": "/var/lib/hsm/lib/libsofthsm2.so",
#          "TokenLabel": "PKCS11CA",
#          "Pin": "<your-hsm-pin>"
#        }
#        EOF
#        kubectl create secret generic fulcio-pkcs11-config \
#          --from-file=crypto11.conf=/tmp/crypto11.conf
#
#   3. Create a PVC for SoftHSM token persistence:
#        kubectl apply -f - <<EOF
#        apiVersion: v1
#        kind: PersistentVolumeClaim
#        metadata:
#          name: hsm-tokens-pvc
#        spec:
#          accessModes: [ReadWriteOnce]
#          resources:
#            requests:
#              storage: 100Mi
#        EOF
#
#   4. Run the key ceremony (initialize token, generate key, create root CA):
#        kubectl create job softhsm-key-ceremony --image=quay.io/rh-ee-sacm/softhsm-init:latest -- ...
#        (See docs/pkcs11-hsm-support.md for the full Job spec)
#
#   5. Extract root CA and create the secret:
#        kubectl create secret generic fulcio-root-ca \
#          --from-file=cert.pem=<path-to-root-ca.pem>
#
#   6. Create the SoftHSM2 config ConfigMap:
#        cat <<EOF > /tmp/softhsm2.conf
#        directories.tokendir = /var/lib/hsm/tokens
#        objectstore.backend = file
#        log.level = INFO
#        EOF
#        kubectl create configmap softhsm-config \
#          --from-file=softhsm2.conf=/tmp/softhsm2.conf
#
apiVersion: rhtas.redhat.com/v1
kind: Securesign
metadata:
  labels:
    app.kubernetes.io/name: securesign-pkcs11-sample
    app.kubernetes.io/instance: securesign-pkcs11-sample
    app.kubernetes.io/part-of: trusted-artifact-signer
  name: securesign-pkcs11-sample
spec:
  rekor:
    externalAccess:
      enabled: true
    monitoring:
      enabled: true
  trillian:
    database:
      create: true
    monitoring:
      enabled: true
  fulcio:
    externalAccess:
      enabled: true
    config:
      OIDCIssuers:
        - ClientID: "trusted-artifact-signer"
          IssuerURL: "https://your-oidc-issuer-url"
          Issuer: "https://your-oidc-issuer-url"
          Type: "email"
    certificate:
      caType: pkcs11
      caRef:
        name: fulcio-root-ca
        key: cert.pem
      pkcs11:
        credentialsRef:
          name: hsm-credentials
          key: pin
        pkcs11ConfigRef:
          name: fulcio-pkcs11-config
          key: crypto11.conf
        keyConfig:
          id: 99
          label: PKCS11CA
        # Vendor-specific init containers for HSM setup.
        # The operator automatically injects HSM_PIN env var and
        # mounts hsm-tokens + hsm-lib volumes into each init container.
        initContainers:
          - name: softhsm-init
            image: quay.io/rh-ee-sacm/softhsm-init:latest
            env:
              - name: SOFTHSM2_CONF
                value: /etc/softhsm/softhsm2.conf
            volumeMounts:
              - name: softhsm-config
                mountPath: /etc/softhsm
                readOnly: true
        # Additional environment variables for the Fulcio server container.
        serverEnv:
          - name: SOFTHSM2_CONF
            value: /etc/softhsm/softhsm2.conf
        # Additional volume mounts for the Fulcio server container.
        serverVolumeMounts:
          - name: softhsm-config
            mountPath: /etc/softhsm
            readOnly: true
        # Pod-level volumes for vendor-specific configuration.
        # The operator manages hsm-tokens and hsm-lib volumes automatically.
        volumes:
          - name: softhsm-config
            configMap:
              name: softhsm-config
          # For SoftHSM, use a PVC to persist the token data across pod restarts.
          # The key ceremony Job must use the same PVC.
          - name: hsm-tokens
            persistentVolumeClaim:
              claimName: hsm-tokens-pvc
    monitoring:
      enabled: true
  tuf:
    externalAccess:
      enabled: true
    keys:
      - name: rekor.pub
      - name: ctfe.pub
      - name: fulcio_v1.crt.pem
      - name: tsa.certchain.pem
    monitoring:
      enabled: true
  ctlog:
    monitoring:
      enabled: true
  tsa:
    externalAccess:
      enabled: true
    monitoring:
      enabled: true
    ntpMonitoring:
      enabled: true
    signer:
      certificateChain:
        rootCA:
          organizationName: Red Hat
          organizationEmail: jdoe@redhat.com
          commonName: tsa.hostname-root
        intermediateCA:
          - organizationName: Red Hat
            organizationEmail: jdoe@redhat.com
            commonName: tsa.hostname-intermediate
        leafCA:
          organizationName: Red Hat
          organizationEmail: jdoe@redhat.com
          commonName: tsa.hostname-leaf
