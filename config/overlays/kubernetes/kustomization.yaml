apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Override the base namespace (config/default sets "openshift-rhtas-operator")
# with a platform-neutral name for vanilla Kubernetes installs. This retargets
# every namespaced resource, including the cert-manager Certificate whose
# namespace is propagated into the webhook configs/CRDs via the replacements
# below, so they stay consistent.
namespace: sigstore-operator

resources:
- ../../default
- ../../certmanager

replacements:
# Substitute cert-manager Certificate namespace/name into webhook configs and CRDs
- source:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: serving-cert
    fieldPath: .metadata.namespace
  targets:
  - select:
      kind: ValidatingWebhookConfiguration
    fieldPaths:
    - .metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: '/'
      index: 0
      create: true
  - select:
      kind: MutatingWebhookConfiguration
    fieldPaths:
    - .metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: '/'
      index: 0
      create: true
  - select:
      kind: CustomResourceDefinition
    fieldPaths:
    - .metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: '/'
      index: 0
      create: true
- source:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: serving-cert
    fieldPath: .metadata.name
  targets:
  - select:
      kind: ValidatingWebhookConfiguration
    fieldPaths:
    - .metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: '/'
      index: 1
      create: true
  - select:
      kind: MutatingWebhookConfiguration
    fieldPaths:
    - .metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: '/'
      index: 1
      create: true
  - select:
      kind: CustomResourceDefinition
    fieldPaths:
    - .metadata.annotations.[cert-manager.io/inject-ca-from]
    options:
      delimiter: '/'
      index: 1
      create: true
# Substitute webhook Service name/namespace into Certificate DNS names
- source:
    kind: Service
    version: v1
    name: webhook-service
    fieldPath: .metadata.name
  targets:
  - select:
      kind: Certificate
      group: cert-manager.io
      version: v1
    fieldPaths:
    - .spec.dnsNames.0
    - .spec.dnsNames.1
    options:
      delimiter: '.'
      index: 0
      create: true
- source:
    kind: Service
    version: v1
    name: webhook-service
    fieldPath: .metadata.namespace
  targets:
  - select:
      kind: Certificate
      group: cert-manager.io
      version: v1
    fieldPaths:
    - .spec.dnsNames.0
    - .spec.dnsNames.1
    options:
      delimiter: '.'
      index: 1
      create: true

# Override component images with public-registry equivalents so vanilla
# Kubernetes clusters (kind, EKS, GKE, ...) do not need registry.redhat.io
# credentials. This merges over the `related-images` ConfigMap generated by
# ../../default, replacing every RELATED_IMAGE_* value. The product default
# registry in config/default/images.env is left unchanged for OpenShift.
configMapGenerator:
- behavior: merge
  options:
    disableNameSuffixHash: true
  envs:
  - images.env
  name: related-images

