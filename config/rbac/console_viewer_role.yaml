# permissions for end users to view consoles.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: console-viewer-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: rhtas-operator
    app.kubernetes.io/part-of: rhtas-operator
    app.kubernetes.io/managed-by: kustomize
  name: console-viewer-role
rules:
- apiGroups:
  - rhtas.redhat.com
  resources:
  - consoles
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - rhtas.redhat.com
  resources:
  - consoles/status
  verbs:
  - get
