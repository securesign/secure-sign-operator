apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Adds namespace to all resources.
namespace: openshift-rhtas-operator

# Value of this field is prepended to the
# names of all resources, e.g. a deployment named
# "wordpress" becomes "alices-wordpress".
# Note that it should also match with the prefix (text before '-') of the namespace
# field above.
namePrefix: rhtas-

# Labels to add to all resources and selectors.
#commonLabels:
#  someName: someValue

resources:
- ../crd
- ../rbac
- ../manager
- ../webhook

patches:
- path: manager_metrics_patch.yaml
  target:
    kind: Deployment
    name: operator-controller-manager
- path: manager_images_patch.yaml
  target:
    kind: Deployment
    name: operator-controller-manager
- path: manager_webhook_patch.yaml
  target:
    kind: Deployment
    name: operator-controller-manager

configMapGenerator:
- behavior: create
  options:
    disableNameSuffixHash: true
  envs:
  - images.env
  name: related-images

replacements:
- source:
    fieldPath: data.RELATED_IMAGE_TRILLIAN_LOG_SIGNER
    kind: ConfigMap
    name: related-images
    version: v1
  targets:
  - fieldPaths:
    - spec.template.spec.containers.[name=^manager$].env.[name=^RELATED_IMAGE_TRILLIAN_LOG_SIGNER$].value
    select:
      kind: Deployment
      name: operator-controller-manager
- source:
    fieldPath: data.RELATED_IMAGE_TRILLIAN_LOG_SERVER
    kind: ConfigMap
    name: related-images
    version: v1
  targets:
  - fieldPaths:
    - spec.template.spec.containers.[name=^manager$].env.[name=^RELATED_IMAGE_TRILLIAN_LOG_SERVER$].value
    select:
      kind: Deployment
      name: operator-controller-manager
- source:
    fieldPath: data.RELATED_IMAGE_TRILLIAN_DB
