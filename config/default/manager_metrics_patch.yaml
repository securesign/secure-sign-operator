# This patch configures secure HTTPS metrics on port 8443
# with authentication and authorization via controller-runtime filters.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name:  operator-controller-manager
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - "--leader-elect"
        - "--metrics-bind-address=:8443"
        - "--metrics-secure=true"
        ports:
        - containerPort: 8443
          name: https
          protocol: TCP
