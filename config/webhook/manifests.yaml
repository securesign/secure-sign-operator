  failurePolicy: Fail
  name: mctlog.kb.io
  rules:
  - apiGroups:
    - rhtas.redhat.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - ctlogs
  sideEffects: None
