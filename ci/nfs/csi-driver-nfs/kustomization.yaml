apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - rbac.yaml

helmCharts:
  - name: csi-driver-nfs
    releaseName: 4.11.0
    namespace: nfs-storage
    repo: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts
    valuesInline:
      serviceAccount:
        controller: csi-nfs-controller-sa
        node: csi-nfs-node-sa
